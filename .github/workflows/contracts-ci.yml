# モノレポの親に .github/workflows があるため、contracts/ 配下を対象にする。
# ホスト runner に forge / slither を直接インストールするのではなく、
# リポジトリに含まれる docker/compose.yml のサービスを通じて実行する
# （ローカルの ./scripts/ci-contracts.sh / ./scripts/slither.sh と同一フロー）。
name: Contracts CI

permissions: {}

on:
  push:
    paths:
      - "contracts/**"
      - "docker/**"
      - "scripts/**"
      - ".github/workflows/contracts-ci.yml"
  pull_request:
    paths:
      - "contracts/**"
      - "docker/**"
      - "scripts/**"
      - ".github/workflows/contracts-ci.yml"
  workflow_dispatch:

jobs:
  check:
    name: Foundry project (docker compose)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
          submodules: recursive

      - name: Run contracts-ci service
        run: docker compose -f docker/compose.yml run --rm --build contracts-ci

  slither:
    name: Slither (audit bundle, docker compose)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
          submodules: recursive

      - name: Run slither service
        run: docker compose -f docker/compose.yml run --rm --build slither

      - name: Upload Slither artifacts
        uses: actions/upload-artifact@v4
        with:
          name: slither-audit-bundle
          path: contracts/audit/slither/
          if-no-files-found: error
